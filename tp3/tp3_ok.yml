---
- name: Installer et configurer node 1‑3
  hosts: all
  remote_user: root
  become: true
  become_user: root
  gather_facts: true          # <‑ s’assure que les facts sont disponibles

  tasks:
    - name: Install apache2 & mysql-server on node 1 & 2
      ansible.builtin.apt:
        update_cache: true
        name:
          - apache2
          - mysql-server
        state: present
      when: ansible_facts["hostname"] != "node3"

    - name: Install git, nginx & cowsay on node 3
      ansible.builtin.apt:
        update_cache: true
        name: "{{ item }}"
        state: present
      loop:
        - git
        - nginx
        - cowsay
      when: ansible_facts["hostname"] == "node3"

    - name: Install ufw **only** on Ubuntu hosts
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true     # optionnel mais pratique si le cache n’est pas à jour
      when: ansible_facts['distribution'] == "Ubuntu"
      # équivalent : when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Gather the package facts (rpm or deb)
      ansible.builtin.package_facts:
        manager: auto

    - name: Copy index.html if apache2 or nginx is installed
      ansible.builtin.template:
        src: template/index.j2
        dest: /var/www/html/index.html
        mode: '0644'
      when: "'apache2' in ansible_facts.packages or 'nginx' in ansible_facts.packages"

    - name: Start apache2
      ansible.builtin.service:
        name: apache2
        state: started
      when: "'apache2' in ansible_facts.packages"

    - name: Start nginx
      ansible.builtin.service:
        name: nginx
        state: started
      when: "'nginx' in ansible_facts.packages"
