---
- name: Installer apache2 et mysql-server
  hosts: all
  become: true

  vars:
    packages:
      - apache2
      - mysql-server

  tasks:
      - name: Récuperer les packages déja installés
        package_facts:
         manager: auto

      - name: Installer les packets necessaires
        apt:
          name: "{{ item }}" 
          state: present
          update_cache: yes
        loop: "{{ packages }}"

      - name: Modifier la page HTML si apche2 était déjà installés
        copy:
          dest: /var/www/html/index.html
          content: |
            <h1>Bonjour depuis Ansible</h1>
        when: "'apache2' in ansible_facts.packages"

      - name: Démarrer et activer apache2
        service:
          name: apache2
          state: started
          enabled: true

      
